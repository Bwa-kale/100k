<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ROAD TO 100K — VAULT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#d4af37;
    --violet:#8b5cf6;
    --neon:#39ff9c;
    --black:#000000;
    --glass:rgba(255,255,255,0.04);
    --glass-border:rgba(255,255,255,0.09);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;min-height:100%;
    background:var(--black);
    display:flex;align-items:flex-start;justify-content:center;
    font-family:'Inter',sans-serif;
    color:#eee;
    padding:24px;
    overflow-x:hidden;
  }
  #stars{
    position:fixed;inset:0;
    pointer-events:none;
  }
  body::before{
    content:'';
    position:fixed;inset:0;
    background:
      radial-gradient(circle at 18% 12%, rgba(139,92,246,0.14), transparent 42%),
      radial-gradient(circle at 88% 85%, rgba(57,255,156,0.10), transparent 48%),
      radial-gradient(circle at 50% 100%, rgba(212,175,55,0.06), transparent 55%);
    pointer-events:none;
  }

  .card{
    position:relative;
    width:380px;
    max-width:100%;
    min-width:0;
    padding:28px 24px 20px;
    background:linear-gradient(165deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border:1px solid var(--glass-border);
    border-radius:22px;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02),
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.06);
    overflow:hidden;
  }
  .card::after{
    content:'';
    position:absolute;top:-50%;left:-25%;
    width:70%;height:220%;
    background:linear-gradient(120deg, transparent, rgba(212,175,55,0.06), transparent);
    transform:rotate(20deg);
    pointer-events:none;
    animation:sheen 7s ease-in-out infinite;
  }
  @keyframes sheen{
    0%,100%{transform:rotate(20deg) translateX(0);}
    50%{transform:rotate(20deg) translateX(30px);}
  }

  .scorpion{
    display:block;
    width:30px;height:30px;
    margin:0 auto 10px;
    opacity:.6;
    filter:drop-shadow(0 0 4px rgba(139,92,246,0.6));
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    color:var(--violet);
    text-transform:uppercase;
    display:flex;justify-content:center;align-items:center;
    gap:14px;
    margin-bottom:14px;
  }
  .eyebrow .status{
    color:var(--neon);
    font-size:9px;
  }
  .eyebrow span.dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--neon);
    box-shadow:0 0 8px var(--neon);
    display:inline-block;margin-right:6px;
  }

  h1{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:20px;
    letter-spacing:.03em;
    text-align:center;
    margin:0 0 18px;
    background:linear-gradient(90deg,#fff, var(--gold) 60%, var(--violet));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .ring-wrap{
    position:relative;
    width:min(226px, 74%);
    aspect-ratio:1/1;
    margin:8px auto 20px;
  }
  svg{transform:rotate(-90deg); overflow:visible; display:block; width:100%; height:100%;}
  .ring-bg{fill:none;stroke:rgba(255,255,255,0.055);stroke-width:10;}
  .ring-fg{
    fill:none;stroke-width:10;stroke-linecap:round;
    stroke:url(#ringGrad);
    filter:drop-shadow(0 0 8px rgba(57,255,156,0.5));
    transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);
  }
  .milestone{
    fill:#000;
    stroke:rgba(255,255,255,0.35);
    stroke-width:1.5;
    r:2.6;
  }
  .milestone.hit{
    fill:var(--gold);
    stroke:var(--gold);
    filter:drop-shadow(0 0 4px var(--gold));
  }
  .comet{
    fill:#fff;
    filter:drop-shadow(0 0 8px var(--neon)) drop-shadow(0 0 16px var(--violet));
    transition:all .8s cubic-bezier(.4,0,.2,1);
  }
  .ring-center{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .hero-amount{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:30px;
    letter-spacing:-.01em;
    background:linear-gradient(90deg,#fff 20%, var(--gold) 65%, var(--neon));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(212,175,55,0.25);
  }
  .pct{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:14px;
    color:var(--violet);
    letter-spacing:.05em;
    margin-top:6px;
  }
  .target-label{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    letter-spacing:.18em;
    color:#666;
    margin-top:8px;
    text-transform:uppercase;
  }

  .stats{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:10px;
    margin-bottom:18px;
  }
  .stat{
    position:relative;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--glass-border);
    border-left:2px solid var(--gold);
    border-radius:10px;
    padding:11px 10px;
    min-width:0;
  }
  .stat:nth-child(2){border-left-color:var(--violet);}
  .stat-label{
    font-family:'JetBrains Mono',monospace;
    font-size:8.5px;
    letter-spacing:.14em;
    color:#777;
    text-transform:uppercase;
    margin-bottom:5px;
  }
  .stat-value{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:14px;
    color:var(--neon);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:-.02em;
  }
  .stat-value.violet{color:var(--violet);}
  .stat-value.gold{color:var(--gold);}

  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent, var(--glass-border), transparent);
    margin:4px 0 16px;
  }

  .input-row{
    display:flex;align-items:center;gap:10px;
    margin-bottom:10px;
  }
  .input-row label{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    letter-spacing:.14em;
    color:#888;
    text-transform:uppercase;
    white-space:nowrap;
    width:92px;
  }
  .input-row .field{
    position:relative;
    flex:1;
  }
  .input-row .field::before{
    content:'$';
    position:absolute;
    left:11px;top:50%;transform:translateY(-50%);
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--gold);
    pointer-events:none;
  }
  .input-row input{
    width:100%;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--glass-border);
    border-radius:9px;
    color:#fff;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    padding:9px 10px 9px 22px;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .input-row input:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(212,175,55,0.12);
  }

  .save-note{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    color:#555;
    text-align:right;
    margin-top:-4px;
    margin-bottom:12px;
    letter-spacing:.05em;
    min-height:12px;
  }

  .milestones-title{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    letter-spacing:.16em;
    color:#777;
    text-transform:uppercase;
    margin:0 0 10px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .milestones-list{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:8px;
    margin-bottom:6px;
  }
  .m-row{
    display:flex;align-items:center;justify-content:space-between;
    gap:6px;
    min-width:0;
    background:rgba(255,255,255,0.025);
    border:1px solid var(--glass-border);
    border-radius:8px;
    padding:7px 10px;
  }
  .m-row.reached{
    border-color:rgba(57,255,156,0.3);
    background:rgba(57,255,156,0.04);
  }
  .m-amt{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:11.5px;
    color:#ddd;
    flex-shrink:0;
  }
  .m-row.reached .m-amt{color:var(--neon);}
  .m-date{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    color:var(--gold);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }
  .m-row.reached .m-date{color:var(--neon);}
  .m-date.pending{color:#555;}

  .assumption-note{
    font-family:'JetBrains Mono',monospace;
    font-size:8.5px;
    color:#4a4a4a;
    text-align:center;
    letter-spacing:.04em;
    margin:10px 0 16px;
    line-height:1.5;
  }

  .footer{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--glass-border);
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    letter-spacing:.16em;
    color:#555;
    text-align:center;
    text-transform:uppercase;
    display:flex;justify-content:space-between;
  }
  .footer span:last-child{color:var(--gold);}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="card">
  <svg class="scorpion" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 8c3 0 5 2 5 5s2 6 5 6 4-2 4-5 2-6 6-6c3 0 5 2 6 5" stroke="url(#scorpGrad)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M30 13l3-2 1 3.5-3.5 1.5z" fill="url(#scorpGrad)"/>
    <circle cx="4" cy="8" r="1.6" fill="var(--gold)"/>
    <defs>
      <linearGradient id="scorpGrad" x1="0" y1="0" x2="40" y2="20" gradientUnits="userSpaceOnUse">
        <stop stop-color="#d4af37"/><stop offset="1" stop-color="#8b5cf6"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="eyebrow"><span><span class="dot"></span>SCORPIO FLOW · VAULT</span><span class="status" id="statusTxt">LIVE</span></div>
  <h1>ROAD TO $100,000</h1>

  <div class="ring-wrap">
    <svg width="226" height="226" viewBox="0 0 226 226">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d4af37"/>
          <stop offset="55%" stop-color="#8b5cf6"/>
          <stop offset="100%" stop-color="#39ff9c"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="113" cy="113" r="98"/>
      <circle class="ring-fg" id="ringFg" cx="113" cy="113" r="98"
        stroke-dasharray="615.75" stroke-dashoffset="615.75"/>
      <g id="milestones"></g>
      <circle class="comet" id="comet" cx="113" cy="15" r="5"/>
    </svg>
    <div class="ring-center">
      <div class="hero-amount" id="curVal">$0</div>
      <div class="pct"><span id="pctVal">0.0</span>% funded</div>
      <div class="target-label">Target · $100,000</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Remaining</div>
      <div class="stat-value gold" id="remVal">$100,000</div>
    </div>
    <div class="stat">
      <div class="stat-label">Next Milestone</div>
      <div class="stat-value violet" id="nextMilestone">$25,000</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="input-row">
    <label for="curInput">Net Worth</label>
    <div class="field">
      <input type="number" id="curInput" placeholder="42,500" min="0" step="100">
    </div>
  </div>
  <div class="input-row">
    <label for="monthlyInput">Monthly Add</label>
    <div class="field">
      <input type="number" id="monthlyInput" placeholder="800" min="0" step="50">
    </div>
  </div>
  <div class="save-note" id="saveNote">&nbsp;</div>

  <div class="milestones-title"><span>Milestone Dates</span></div>
  <div class="milestones-list" id="milestonesList"></div>
  <div class="assumption-note" id="assumptionNote">Projected from flat monthly contribution — no market growth assumed</div>

  <div class="footer"><span>MAXIMUS · FIRE @ 55</span><span id="dragonTag">SCORPIO DRAGON</span></div>
</div>

<script>
  /* ---------- starfield ---------- */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length:90}, ()=>({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.2 + 0.2,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.015 + 0.005
    }));
  }
  window.addEventListener('resize', resize);
  resize();
  function drawStars(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const s of stars){
      const a = 0.25 + 0.55 * Math.abs(Math.sin(t*s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  /* ---------- storage adapter ----------
     window.storage only exists inside Claude.ai artifacts. Once this file
     is self-hosted (e.g. GitHub Pages), it's undefined — fall back to
     localStorage so saving still works there. */
  const store = {
    async get(key){
      if(window.storage){
        try{ return await window.storage.get(key); }
        catch(e){ return null; }
      }
      const raw = localStorage.getItem(key);
      return raw !== null ? { value: raw } : null;
    },
    async set(key, value){
      if(window.storage){
        return window.storage.set(key, value);
      }
      localStorage.setItem(key, value);
      return { value };
    }
  };

  /* ---------- ring / progress ---------- */
  const R = 98;
  const CX = 113, CY = 113;
  const CIRC = 2 * Math.PI * R;
  const ringFg = document.getElementById('ringFg');
  const comet = document.getElementById('comet');
  const milestonesG = document.getElementById('milestones');
  const pctVal = document.getElementById('pctVal');
  const curVal = document.getElementById('curVal');
  const remVal = document.getElementById('remVal');
  const nextMilestone = document.getElementById('nextMilestone');
  const curInput = document.getElementById('curInput');
  const monthlyInput = document.getElementById('monthlyInput');
  const saveNote = document.getElementById('saveNote');
  const statusTxt = document.getElementById('statusTxt');
  const milestonesList = document.getElementById('milestonesList');

  ringFg.setAttribute('stroke-dasharray', CIRC.toFixed(2));

  const MILESTONE_PCTS = [10,20,30,40,50,60,70,80,90];
  MILESTONE_PCTS.forEach(p=>{
    const angle = (p/100) * 2 * Math.PI - Math.PI/2;
    const x = CX + R * Math.cos(angle);
    const y = CY + R * Math.sin(angle);
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', x); c.setAttribute('cy', y);
    c.setAttribute('r', 2.6);
    c.setAttribute('class','milestone');
    c.setAttribute('data-pct', p);
    milestonesG.appendChild(c);
  });

  function fmt(n){
    return '$' + Math.round(n).toLocaleString('en-US');
  }
  function fmtK(n){
    return '$' + Math.round(n/1000) + 'K';
  }
  const MONTH_FMT = new Intl.DateTimeFormat('en-US', { month:'short', year:'numeric' });

  function renderMilestoneDates(current, monthly){
    milestonesList.innerHTML = '';
    const now = new Date();
    for(let target = 10000; target <= 100000; target += 10000){
      const row = document.createElement('div');
      row.className = 'm-row';
      const amt = document.createElement('span');
      amt.className = 'm-amt';
      amt.textContent = fmtK(target);
      const date = document.createElement('span');
      date.className = 'm-date';

      if(current >= target){
        row.classList.add('reached');
        date.textContent = 'reached';
      } else if(monthly > 0){
        const monthsNeeded = Math.ceil((target - current) / monthly);
        const projected = new Date(now.getFullYear(), now.getMonth() + monthsNeeded, 1);
        date.textContent = MONTH_FMT.format(projected);
      } else {
        date.textContent = 'add $/mo';
        date.classList.add('pending');
      }
      row.appendChild(amt);
      row.appendChild(date);
      milestonesList.appendChild(row);
    }
  }

  function render(current, monthly){
    const target = 100000;
    const pct = Math.max(0, Math.min(100, (current / target) * 100));
    const offset = CIRC - (pct / 100) * CIRC;
    ringFg.setAttribute('stroke-dashoffset', offset.toFixed(2));

    const angle = (pct/100) * 2 * Math.PI - Math.PI/2;
    comet.setAttribute('cx', (CX + R * Math.cos(angle)).toFixed(2));
    comet.setAttribute('cy', (CY + R * Math.sin(angle)).toFixed(2));

    document.querySelectorAll('.milestone').forEach(m=>{
      const mp = parseFloat(m.getAttribute('data-pct'));
      m.classList.toggle('hit', pct >= mp);
    });

    pctVal.textContent = pct.toFixed(1);
    curVal.textContent = fmt(current);
    remVal.textContent = fmt(Math.max(0, target - current));

    const nextM = MILESTONE_PCTS.find(m => pct < m);
    nextMilestone.textContent = nextM ? fmt(nextM/100*target) : fmt(target);

    renderMilestoneDates(current, monthly);
  }

  let saveTimer;
  async function persist(value, monthly){
    saveNote.textContent = 'saving…';
    try{
      await store.set('road-to-100k:net-worth', JSON.stringify({ value, monthly, updated: Date.now() }));
      saveNote.textContent = 'saved';
      statusTxt.textContent = 'LIVE';
    }catch(e){
      saveNote.textContent = 'storage unavailable — session only';
    }
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{ saveNote.textContent = ''; }, 1800);
  }

  function currentValues(){
    return {
      v: parseFloat(curInput.value) || 0,
      m: parseFloat(monthlyInput.value) || 0
    };
  }

  function onEdit(){
    const { v, m } = currentValues();
    render(v, m);
    persist(v, m);
  }

  curInput.addEventListener('input', onEdit);
  curInput.addEventListener('change', onEdit);
  monthlyInput.addEventListener('input', onEdit);
  monthlyInput.addEventListener('change', onEdit);

  async function init(){
    let stored = { value: 0, monthly: 0 };
    try{
      const res = await store.get('road-to-100k:net-worth');
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        stored.value = parsed.value || 0;
        stored.monthly = parsed.monthly || 0;
      }
    }catch(e){ /* no saved value yet */ }

    // Mobile browsers can silently restore typed values into inputs on
    // reload without firing an 'input' event — reconcile against that.
    const autoV = curInput.value !== '' ? parseFloat(curInput.value) : NaN;
    const autoM = monthlyInput.value !== '' ? parseFloat(monthlyInput.value) : NaN;
    const finalV = !isNaN(autoV) ? autoV : stored.value;
    const finalM = !isNaN(autoM) ? autoM : stored.monthly;

    curInput.value = finalV || '';
    monthlyInput.value = finalM || '';
    render(finalV, finalM);
    if(finalV !== stored.value || finalM !== stored.monthly) persist(finalV, finalM);
  }
  window.addEventListener('pageshow', init);
  init();
</script>
</body>
</html>
